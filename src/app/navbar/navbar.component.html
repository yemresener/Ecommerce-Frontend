
    <nav class="navbar">
        <div class="nav-container">
            <!-- Main Navigation -->
            <div class="main-nav">
                <a href="/home" class="logo">
                    <img class="logo-img" src="assets/images/favLast.png" alt="">
                </a>
                
                <!-- Desktop Search -->
                <div class="search-container">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="search" class="search-input" placeholder="Ürün, kategori veya marka ara...">
                </div>



                <div class="right">

                    <div class="premium-controls">
        
                        <!-- Hesabım / Login -->
                        <div class="control-item">
                            <!-- Skeleton -->
                            <div *ngIf="isLoading" class="skeleton premium-skeleton"></div>
                            
                            <!-- İçerik -->
                            <ng-container *ngIf="!isLoading">
                                <a *ngIf="!user()" href="/login" class="premium-btn">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    <span class="btn-text">Giriş Yap</span>
                                </a>
                                
                                <a *ngIf="user()" routerLink="hesabim" class="premium-btn logged-in">
                                    <!-- Kullanıcının baş harfi veya ikonu için şık bir yuvarlak -->
                                    <div *ngIf="user()" class="avatar-circle">{{user()?.name | firstLetter }}</div>
                                    <span class="btn-text">Hesabım</span>
                                </a>
                            </ng-container>
                        </div>
                
                        <!-- Araya İnce Bir Ayraç (Airbnb / Apple tarzı) -->
                        <div class="control-divider"></div>
                
                        <!-- Sepet -->
                        <div class="control-item">
                            <!-- Skeleton -->
                            <div *ngIf="isLoading" class="skeleton premium-skeleton"></div>
                            
                            <!-- İçerik -->
                            <a *ngIf="!isLoading" routerLink="cart" class="premium-btn">
                                <div class="cart-wrapper">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="9" cy="21" r="1"></circle>
                                        <circle cx="20" cy="21" r="1"></circle>
                                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                    </svg>
                                    <!-- Badge sadece içinde ürün varsa minimal bir nokta/sayı olarak çıkar -->
                                    <span class="premium-badge" *ngIf="cartCount()">{{ cartCount() }}</span>
                                </div>
                                <span class="btn-text">Sepetim</span>
                            </a>
                        </div>
                
                    </div>

                    
                    <button class="search-toggle-btn" (click)="toggleSearch()">
                        <svg *ngIf="!isSearchOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <!-- Açıkken X ikonu -->
                        <svg *ngIf="isSearchOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6 6 18M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
              

       

                <!-- Mobile Search -->
                <div class="mobile-search" [class.open]="isSearchOpen" (clickOutside)="closeSearch()">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="11" cy="11" r="8"></circle>
                      <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input 
                      type="search" 
                      class="search-input" 
                      placeholder="Ara..."
                      [autofocus]="isSearchOpen">
                  </div>


            </div>

      
            <div class="nav-hover-wrapper" *ngIf="categoryActive" (mouseleave)="activeCategory = null">
            <!-- Category Bar -->
                <div class="category-bar">
                    <div class="category-list">
                        <li *ngFor="let item of categories" (mouseenter)="activeCategory = item"
                         class="category-item"><a href="{{item.slug}}" class="category-link">{{item.name}}</a></li>


                        
                    </div>
                    
                </div>
                

            
                <div class="mega-menu" *ngIf="activeCategory && activeCategory.children?.length"
                
                (mouseleave)="activeCategory = null">
                    <div class="mega-col">
                     <h4>{{activeCategory.name}}</h4>
                        <a *ngFor="let child of activeCategory.children" href="{{child.slug}}">{{child.name}}</a>
                    </div>

                    <div class="mega-products">
                        <h4 class="mega-products-title">Popüler Ürünler</h4>
                    
                        <div class="products-container">
                          <div class="product-box" *ngFor="let item of activeCategory.popular_adverts">
                            <img src="{{item.item_ref.image}}" class="product-image">
                            <span class="product-label">{{item.title}}</span>
                          </div>
                        </div>
                    </div>

                </div>


            </div>
        
        

        </div>
    </nav>
