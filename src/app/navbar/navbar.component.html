<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Shop - Ecommerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <!-- Main Navigation -->
            <div class="main-nav">
                <a href="/" class="logo">YunusYem</a>
                
                <!-- Desktop Search -->
                <div class="search-container">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="search" class="search-input" placeholder="Ürün, kategori veya marka ara...">
                </div>

                <div class="location-selector">
                    <i class="fa-solid fa-location-dot" style="color:#3B82F6"></i>
                
                    <span class="location-text">İstanbul</span>
                </div>

                <div class="nav-actions">
                    <a href="/login" class="nav-link"><i class="fa-solid fa-user"></i> Hesabım</a>
                </div>
                

                <button class="cart-button">
                    <svg class="cart-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span>Sepetim</span>
                </button>

       

                <!-- Mobile Search -->
                <div class="search-container mobile-search">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="search" class="search-input" placeholder="Ara...">
                </div>
            </div>

      
            <div class="nav-hover-wrapper" (mouseleave)="activeCategory = null">
            <!-- Category Bar -->
                <div class="category-bar">
                    <div class="category-list">
                        <li *ngFor="let item of categories" (mouseenter)="activeCategory = item"
                         class="category-item"><a href="{{item.slug}}" class="category-link">{{item.name}}</a></li>


                        
                    </div>
                    
                </div>
                

            
                <div class="mega-menu" *ngIf="activeCategory && activeCategory.children?.length"
                
                (mouseleave)="activeCategory = null">
                    <div class="mega-col">
                     <h4>{{activeCategory.name}}</h4>
                        <a *ngFor="let child of activeCategory.children" href="{{child.slug}}">{{child.name}}</a>
                    </div>

                    <div class="mega-products">
                        <h4 class="mega-products-title">Popüler Ürünler</h4>
                    
                        <div class="products-container">
                          <div class="product-box" *ngFor="let item of activeCategory.popular_adverts">
                            <img src="{{item.item_ref.image}}" class="product-image">
                            <span class="product-label">{{item.title}}</span>
                          </div>
                        </div>
                    </div>

                </div>


            </div>
        
        

        </div>
    </nav>


        

</body>
</html>
