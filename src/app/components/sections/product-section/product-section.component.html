<div class="best-container">
    <label class="best-label">{{title}}</label>
  
    <app-slider
      *ngIf="productSlider"
      [slider]="productSlider"
      [itemWidth]="245">
  
      <app-card
        *ngFor="let item of productSlider.items"
        [item]="item">
      </app-card>
  
    </app-slider>
  </div>
