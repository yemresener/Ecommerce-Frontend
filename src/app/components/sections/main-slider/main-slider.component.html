<div class="container">
        <div class="slider main-slider">

            <app-slider
            [slider]="mainSlider"
            [itemWidth]="1200"
            [type]="'main'"
            >


            <div class="slider-track">
                <div *ngFor="let slide of items" class="slide" >
                    <picture>
                        <source media="(max-width: 600px)" [attr.srcset]="slide.ref.mobile_image">
                        <img [src]="slide.ref.image" [alt]="slide.ref.title">
                    </picture>
                </div>
            </div>


        </app-slider>

        </div>
</div>
