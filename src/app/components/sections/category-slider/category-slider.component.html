<div class="category-container">
    <ng-container *ngIf="!skeleton; else labelSkeleton">
      <label class="category-label">{{title}}</label>
    </ng-container>

    <ng-template #labelSkeleton>
      <div class="category-label sk-label shimmer"></div>
    </ng-template>

  <app-slider [slider]="categorySlider">

    <div class="slider-box">
      <div class="slider-window">
        <div class="slider-track">

          <!-- REAL -->
          <ng-container *ngIf="!skeleton; else skeletonList">
            <div class="category-item" *ngFor="let c of categorySlider.items">
              <div class="item-inner">
                <img [src]="c.image"
               
                 alt="">
              </div>
              <p class="item-title">{{c.name}}</p>
            </div>
          </ng-container>

          <!-- SKELETON -->
          <ng-template #skeletonList>

            <div class="category-item  skeleton-item" *ngFor="let s of [1,2,3,4,5,6]">
              <div class="sk-image shimmer"></div>
              <div class="sk-title shimmer"></div>
            </div>
          </ng-template>

        </div>
      </div>
    </div>

  </app-slider>
</div>
