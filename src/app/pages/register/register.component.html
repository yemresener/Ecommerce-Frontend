
<app-step1-email
[loading]="loadingStep1" [message]="errorMessage"
(closed)="errorMessage = ''"
(submitEmail)="onOtpVerify($event)" 
[switchButtons]="true"
*ngIf="step==='emailOtp'"
></app-step1-email>


<app-step2-verify-code
[email]="userMail"
[loading]="loadingStep2"
(resentOtpEvent)="resendOtp()"
[message]="errorMessage"
[componentTitle]="'Hesabınızı oluşturun'"
(closed)="errorMessage = ''"

*ngIf="step==='verifyOtp'"
(submitOtp)="submitOtp($event)">

</app-step2-verify-code>



<app-step3-create-acc
[loading]="loadingStep3"

[message]="errorMessage"
(closed)="errorMessage = ''"
*ngIf="step==='createAcc'"
  (createAcc)="createAcc($event)"
></app-step3-create-acc>
