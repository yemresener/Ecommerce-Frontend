
<input [(ngModel)]="email" type="text" placeholder="phoneNumber Or Email"> <br>
<input [(ngModel)]="password" type="text" placeholder="password"><br>
<button (click)="tryToLogin()" >Giriş </button><br>
{{email }} <br> {{password }}
<br><br>
<button (click)="tryToGetInfo()">bilgilerimi al</button>


<div class="checkout-card">
    <h3>Ödeme Bilgileri</h3>
  
    <label for="name">Ad Soyad</label>
    <input id="name" type="text" [(ngModel)]="customerName" placeholder="Kart sahibinin adı" />
  
    <label>Kart Bilgileri</label>
    <!-- Stripe Elements burada mount edilecek -->
    <div #cardInfo id="card-element" style="padding:10px; border:1px solid #e6e6e6; border-radius:8px;"></div>
  
    <div *ngIf="cardErrors" class="error" style="color:#fa755a; margin-top:8px;">
      {{ cardErrors }}
    </div>
  
    <button (click)="pay()" [disabled]="loading" style="margin-top:12px;">
      {{ loading ? 'İşleniyor...' : 'Ödemeyi Tamamla' }}
    </button>
  
    <div *ngIf="paymentMessage" style="margin-top:12px;">
      {{ paymentMessage }}
    </div>
  </div>



<div class="test" style="margin-top: 30px;">
  <input type="text" placeholder="name" [(ngModel)]="name">
  <input type="text" placeholder="category_id" [(ngModel)]="category_id">
  <input type="text" placeholder="price" [(ngModel)]="price">
  <input type="text" placeholder="stock" [(ngModel)]="stock">
  <label *ngFor="let f of featureList">
    <input 
      type="checkbox"
      [checked]="isSelected(f)"
      (change)="toggleFeature(f)"
    >
    {{ f.label }}
  </label><button (click)="createProduct()">submit</button>

  <input multiple type="file" (change)="addImage($event)">
</div>



<div class="deneme" style="margin-top: 30px;">

<input type="file" (change)="onFileSelected($event,'main')">

<input type="file" (change)="onFileSelected($event,'mobile')">

<button (click)="createCampaign()">ekle</button>
</div>
