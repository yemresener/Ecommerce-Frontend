
<section class="campaign-details">

    <!-- FULL WIDTH IMAGE -->
    <ng-container *ngIf="loading; else imageLoad">
      <div class="campaign-banner img-skeleton shimmer"></div>
    </ng-container>

    <ng-template #imageLoad>
      <div  class="campaign-banner" *ngIf="campaign">
        <img [src]="campaign?.image" alt="Campaign Image">
      </div>
    </ng-template>
    


  </section>




<div class="container">
    <div class="title-box">
        <label class="title">Kampanyalı Ürünler</label>
        <app-category-filter
          (filterChange)="onFilterChange($event)"
          [filters]="currentFilters"
        ></app-category-filter>

    </div>
    
    <section class="adverts">
      <div class="products">
        <ng-container *ngFor="let page of pages">
          <app-card
            *ngFor="let item of page.items"
            [skeleton]="isLoading"
            [item]="item">
          </app-card>
        </ng-container>
        <div style="height:1px;" #scrollAnchor></div>
      </div>
    </section>


</div>


 <!-- ORTALI CONTENT -->
 <div class="detail-box" *ngIf="campaign">
    <div class="campaign-texts">
      <h1 class="campaign-title">{{ campaign.title }}</h1>
      <p class="campaign-description">{{ campaign.description }}</p>
      <div class="campaign-dates">
        <span>Başlangıç: {{ campaign.start_date | date:'dd MMM yyyy' }}</span>
        <span> Bitiş: {{ campaign.end_date | date:'dd MMM yyyy' }}</span>
      </div>
    </div>

</div>
