

<app-review-filter (filterChange)="onFilterChange($event)">

</app-review-filter>


<app-product-review *ngIf="advert && reviews" [addCart]="true" [advert]="advert" [reviews]="reviews" [stats]="stats">
    
    <div review-title  class="review-box" >
    <label  class="review-title">Kullanıcı Yorumları <label style="font-weight: 100;
        font-size: 18px;
        color: gray;">(2)</label></label>
        <a class="product-detail" [attr.href]="'/' + advert.slug" for=""> <i class="fas fa-reply reply-icon"></i> Ürün Detayları</a>
    </div>
</app-product-review>
