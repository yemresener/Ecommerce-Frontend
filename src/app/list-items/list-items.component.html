<div class="container">

    <div class="box">
      
      <!-- Filtre Alanı -->
      <aside class="filter">
        <div class="filter-category">
            <label class="filter-title" (click)="categoryOpen=!categoryOpen">Kategoriler
              <i class="fa-solid" style="font-size: 12px;" [ngClass]="{'fa-caret-down': !categoryOpen, 'fa-caret-up': categoryOpen}"></i>

            </label>
   
        
            <!-- Children -->
            <div class="category-child-wrapper" [class.open]="categoryOpen">
              <div >
              </div>
            </div>
        </div>



  

  
        <div class="filter-price">
            <label class="filter-title" (click)="priceOpen=!priceOpen">Fiyat Aralığı
                <i class="fa-solid" style="font-size: 12px;" [ngClass]="{'fa-caret-down': !priceOpen, 'fa-caret-up': priceOpen}"></i>
            </label>

            <div class="category-child-wrapper" [class.open]="priceOpen">

                <div class="price-section">
                    <input placeholder="En az" [(ngModel)]="min_price">
                    <input placeholder="En fazla" [(ngModel)]="max_price">
                    <button (click)="applyPrices()" class="apply-price"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </div>
 
  
      </aside>
  
      <!-- Ürün Alanı -->
      <section class="adverts">

          <div class="breadcrumb">
            <div class="bread-skeleton-wrapper" [class.hide]="!isLoading">

              <div class="bread-skeleton shimmer"></div>
              <div class="bread-separator shimmer"></div>
          
              <div class="bread-skeleton shimmer small"></div>
              <div class="bread-separator shimmer"></div>
          
              <div class="bread-skeleton shimmer smaller"></div>
          
            </div>

            <div class="bread-box"  [class.hide]="isLoading" *ngFor="let item of breadcrumb; let last = last">
              <span>{{ item?.name }}</span>
              <i class="fas fa-chevron-right" *ngIf="!last"></i>
            </div>
          </div>
  
        <div class="total-count">
          <div class="total-label">

            <!-- Skeleton -->
            <div class="label-skeleton shimmer" [class.hide]="!isLoading"></div>
          
            <!-- Gerçek içerik -->
            <div class="label-content" [class.hide]="isLoading">
              {{activeCategory?.name}}
              <span class="product-count">
                {{meta?.total}} ürün
              </span>
            </div>
          
          </div>

            <app-category-filter 
            
              (filterChange)="onFilterChange($event)"
              [filters]="currentFilters"
              >
            </app-category-filter>
        </div>
        
        <div *ngIf="minPageLoaded>1" class="loadPrevious" style="display: flex; justify-content: center;">
          <button (click)="loadPrevious()">Daha fazla yükle</button>
        </div>




        <div class="">
            <ng-container *ngFor="let page of pages">
              <div class="products"
                  [attr.data-page]="page.page"
                  #pageBlock>

                <app-card 
                  *ngFor="let item of page.items"
                  [skeleton]="isLoading"
                  [item]="item">
                </app-card>

              </div>
            </ng-container>
        </div>
        <div style="height: 1px;" #scrollAnchor></div>

      </section>
  
    </div>
  
  </div>
