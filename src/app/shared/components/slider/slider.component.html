<div class="best-box"

>

    <!-- Sol ok -->
    <button
      class="best-arrow left"
      (click)="prev()"
      [class.hidden]="slider.index === 0 && type!=='main'"
      [class.main]="type==='main'"
    >
      ‹
    </button>
  
    <!-- Slider window -->
    <div class="slider-window-best"
    (touchstart)="onTouchStart($event)"
    (touchend)="onTouchEnd($event)"
    
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseUp()"
    [class.mobile]="type!=='main'"
    >
      <div
        class="slider-track-best"
        [style.transform]="getTransform()"
      >
        <ng-content></ng-content>
      </div>
    </div>
  
    <!-- Sağ ok -->
    <button
      class="best-arrow right"
      (click)="next()"
      [class.hidden]="slider.index >= maxIndex() && type!=='main'"
      [class.main]="type==='main'"
    >
      ›
    </button>
    <label *ngIf="type==='main'" class="index-count">{{slider.index+1 }} / {{slider.items.length}}</label>
  </div>
